<!-- Actividad 5
 Flujo del proyecto:El proyecto son dos pantallas conectadas, no todo en una sola página.
login.html: pantalla de acceso, con formulario de correo y contraseña validados. Al pasar la validación (simulado con JS, no requiere backend), se redirige a index.html.
index.html: pantalla del sistema ya "dentro", con sidebar, navbar y el resto de la funcionalidad.
Requisitos técnicos:

HTML, CSS y JS.

Puede usarse Bootstrap o Tailwind CSS como base de estilos (no ambos mezclados, y no otros frameworks de JS como React o Vue).

Debe integrar las funciones ya creadas en la librería utileria.js.  
Estructura visual de index.html:
Sidebar (menú lateral): con botón hamburguesa para abrir/cerrar. Debe incluir la opción Usuarios, con submenú desplegable Captura.

Navbar (barra superior): a la derecha debe mostrarse el nombre del usuario que "inició sesión". Al dar clic en el nombre, debe desplegarse un menú con la opción de Salir del sistema (que regresa a login.html, simulando el cierre de sesión).

Funcionalidad requerida dentro de index.html:
Menú Usuarios (en el sidebar): submenú Captura, con formulario de nombre de usuario, correo electrónico y contraseña, validado con validarCorreo y validarPassword.
Formulario de alumnos: agregar campo de número de control, validado con longitud de 6 dígitos.
Modal de edad: mostrar si el alumno es mayor de edad o no.
Navbar con nombre de usuario: mostrar el nombre o correo capturado en login.html, con menú desplegable para cerrar sesión.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Académico - Panel de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Enlaces CSS -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/AkNdrow/Actividad-3-----Componente-VIsual@1.0.1/CSS/EstilosComponentes.css">
    <link rel="stylesheet" href="CSS/stylesCustom.css">

    <!-- Enlaces JS -->
    <script
        src="https://cdn.jsdelivr.net/gh/AkNdrow/Actividad-3-----Componente-VIsual@1.0.1/JS/LibreriaComponentes.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AkNdrow/Actividad-2---Utileria@1.0.1/JS/utileria.js"></script>

    <script src="JS/Libreria.js" defer></script>
    <script src="JS/index.js" defer></script>
</head>

<body class="bg-slate-100 text-slate-800 font-sans antialiased">


    <nav
        class="fixed top-0 z-40 w-full bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-4">
            <button id="btnHamburguesa" class="p-2 rounded-md hover:bg-slate-100 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" x2="20" y1="12" y2="12" />
                    <line x1="4" x2="20" y1="6" y2="6" />
                    <line x1="4" x2="20" y1="18" y2="18" />
                </svg>
            </button>
            <span class="font-bold text-lg text-purple-600">TecNM Control</span>
        </div>
        <button id="btnRegresar"
            class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-slate-100 transition font-medium text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Regresar
        </button>
        <div class="relative">

            <button id="btnUsuarioDropdown"
                class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-slate-100 transition font-medium text-sm">
                <span id="nombreUsuarioNavbar">Cargando...</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m6 9 6 6 6-6" />
                </svg>
            </button>
            <div id="usuarioDropdown"
                class="hidden absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-md shadow-lg py-1 z-50">
                <button id="btnSalir"
                    class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition flex items-center gap-2">
                    Salir del sistema
                </button>
            </div>
        </div>
    </nav>


    <div id="sidebarContainer">
        <aside id="sidebar"
            class="fixed top-16 left-0 z-30 w-64 h-[calc(100vh-64px)] bg-white border-r border-slate-200 transition-transform duration-300 transform -translate-x-full md:translate-x-0">
            <div class="p-4 space-y-2">
                <div>
                    <button id="btnMenuUsuarios"
                        class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-slate-100 transition font-semibold">
                        <div class="flex items-center gap-3">
                            <span>👥</span>
                            <span>Usuarios</span>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </button>
                    <div id="subminiCaptura" class="pl-9 mt-1 space-y-1">
                        <a href="#moduloCaptura"
                            class="block p-2 text-sm text-purple-600 font-medium border-l-2 border-purple-600 pl-3">
                            Captura
                        </a>
                    </div>
                </div>
            </div>
        </aside>
    </div>


    <main class="md:pl-64 pt-24 p-6 min-h-screen">
        <div id="moduloCaptura" class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold border-b border-slate-200 pb-3 mb-6">Formulario de Captura de Alumnos</h2>

            <form id="formAlumnos" class="space-y-5" novalidate>
                <div>
                    <label class="block text-sm font-semibold mb-1.5">Nombre de Usuario</label>
                    <input type="text" id="nombreAlumno"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500"
                        placeholder="Ej. Juan Pérez">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Correo Electrónico</label>
                    <input type="email" id="correoAlumno"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500"
                        placeholder="juan@tecnm.mx">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Contraseña</label>
                    <input type="password" id="passAlumno"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500"
                        placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Número de Control (6 dígitos)</label>
                    <input type="text" id="numControlAlumno" maxlength="6"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500"
                        placeholder="Ej. 241234">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Edad del Alumno</label>
                    <input type="number" id="edadAlumno"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500"
                        placeholder="Ej. 19">
                </div>

                <button type="submit"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 transition text-white font-medium rounded-md shadow-md mt-4">
                    Registrar y Validar Alumno
                </button>
            </form>
        </div>
    </main>

    <!-- Modal Personalizado (Fase 3) -->
    <div id="modalEdad"
        class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="modal-custom bg-white w-full max-w-sm rounded-xl p-6 text-center space-y-4 shadow-2xl relative">
            <div id="modalIcono" class="text-5xl mb-2"></div>
            <h3 id="modalTitulo" class="text-xl font-bold"></h3>
            <p id="modalMensaje" class="text-sm"></p>
            <button id="btnCerrarModal" class="w-full py-2 mt-4 rounded-md font-medium text-sm transition">
                Entendido
            </button>
        </div>
    </div>

</body>

</html>

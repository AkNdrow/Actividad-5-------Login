<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Académico - Iniciar Sesión</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md border border-slate-200 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-purple-600">TecNM Control</h1>
            <p class="text-slate-500 text-sm mt-1">Inicia sesión para acceder al sistema académico</p>
        </div>

        <form id="formLogin" class="space-y-4" novalidate>
            <div>
                <label class="block text-sm font-semibold mb-1.5">Correo Electrónico</label>
                <input type="email" id="loginCorreo" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500" placeholder="usuario@tecnm.mx" required>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1.5">Contraseña</label>
                <input type="password" id="loginPass" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-purple-500" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full py-3 bg-purple-600 hover:bg-purple-700 transition text-white font-medium rounded-md shadow-md mt-2">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", (e) => {
            e.preventDefault();
            const correo = document.getElementById("loginCorreo").value.trim();
            const pass = document.getElementById("loginPass").value.trim();

            if (!correo || !pass) {
                alert("Por favor, llena todos los campos.");
                return;
            }

            
            localStorage.setItem("usuarioLogueado", correo);
            
            
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
